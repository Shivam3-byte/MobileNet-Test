<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Disease Demo</title>
    <style>
      :root {
        --bg: #f4f1e8;
        --card: #fffdf7;
        --text: #1f2a1f;
        --accent: #2f7d4a;
        --border: #d7d0bf;
      }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #eef5e7, #f7f0e1);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.5;
      }
      input, button {
        font: inherit;
      }
      input[type="text"], input[type="file"] {
        width: 100%;
        margin: 8px 0 16px;
      }
      button {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        cursor: pointer;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #f6f8f4;
        border-radius: 12px;
        padding: 16px;
      }
      .muted {
        color: #5a6559;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Plant Disease Detection Demo</h1>
        <p class="muted">Upload a leaf image and send it to your Render-hosted FastAPI backend.</p>

        <label for="apiUrl">API URL</label>
        <input id="apiUrl" type="text" value="http://127.0.0.1:8000/predict" />

        <label for="imageFile">Leaf Image</label>
        <input id="imageFile" type="file" accept="image/*" />

        <button id="submitBtn">Predict</button>

        <h2>Response</h2>
        <pre id="output">No prediction yet.</pre>
      </div>
    </div>

    <script>
      const submitBtn = document.getElementById("submitBtn");
      const output = document.getElementById("output");

      submitBtn.addEventListener("click", async () => {
        const apiUrl = document.getElementById("apiUrl").value.trim();
        const fileInput = document.getElementById("imageFile");
        const file = fileInput.files[0];

        if (!apiUrl) {
          output.textContent = "Enter a backend API URL.";
          return;
        }
        if (!file) {
          output.textContent = "Choose an image first.";
          return;
        }

        const formData = new FormData();
        formData.append("file", file);
        output.textContent = "Running prediction...";

        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            body: formData
          });
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = `Request failed: ${error.message}`;
        }
      });
    </script>
  </body>
  </html>
